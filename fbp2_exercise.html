        <div class="main"> 

            <div class="page_controls">

            </div>

            
            <h2>Exercise 1</h2>
            <p class="problem-statement">Mia filled a large pitcher with 8/13 glasses
                of orange juice and 6 glasss of guava juice to make a smoothie.
            </p>
            <p class="problem-statement">How many glasses of juice was the pitcher field with? 
                Write your answer in simplest form.
            </p>

            <input type="text" id="answerInput" placehodler="your answer here">
            <button class="button" id="submitBtn">Check</button>

            <p class="hint"></p>

            <p id="feedback"></p>
        
        </main>

    <script>
        let attempts = 0;
        document.getElementById("submitBtn").addEventListener("click", function() {
           
            let userAnswer = document.getElementById("answerInput").value.trim();

            let feedback = document.getElementById("feedback");

            if(userAnswer === "") {
                feedback.textContent = "Please type answer first!";
                feedback.style.color = "blue";
                return;
            }
            if(userAnswer === "6 8/13") {
                feedback.textContent = "Correct✅ Lets go!";
                feedback.style.color = "green";
                document.getElementById("answerInput").value = "6 8/13";
                return;
            }else {
                attempts++;
                if (attempts >= 3) {
                    feedback.textContent = "The answer is 6 8/13. Keep practicing!";
                    feedback.style.color = "red";
                } else{
                    feedback.textContent = "Not quite - try again!";
                    feedback.style.color = "red";
                }
            }
            document.getElementById("answerInput").value = "";
        });
    </script>


</body>
