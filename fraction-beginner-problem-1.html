<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMathSite</title>
    <link rel="stylesheet" href="styleProblem.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Luckiest+Guy&display=swap" rel="stylesheet">

    
    <style>

        .lesson-layout {
            display: flex;
            gap:30px;
            align-items: flex-start;
        }

        .classroom {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            max-width: 500px;
            transform: scale(0.80);
            margin: 40px auto 0 auto;
            padding: 30px 30px;
        }

        .steps-panel {
            flex: 1;        
            max-height: 380px;
            overflow-y: auto;
        }

        .step-card {
            background: white;
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 12px;
            border: 1px solid #8b8a88;
        }

        .step-question {
            font-size: 15px;
            color: black;
            margin-bottom: 8px;
        }

        .step-answer {
        font-size: 16px;
        font-weight: bold;
        color: #1D9E75;
        opacity: 0;
        transition: opacity 0.6s ease;
        }

        .step-why {
        font-size: 13px;
        color: gray;
        font-style: italic;
        opacity: 0;
        transition: opacity 0.6s ease;
        margin-top: 6px;
        }

        .visible {
        opacity: 1 !important;
        }

        .frame {
            display: none;
            height: 100px;
            overflow: hidden;
        }

        .frame * {
            margin: 0;
        }

        .frame.active 
        {
            display:block;
        }

        #prevBtn {
            visibility: hidden;
        }

        #nextBtn {
            visibility: hidden;
        }

        .student {
            display: flex;
            transform: scale(0);
            transition: transform 0.5s ease;
            flex-direction: column;
            align-items: center;
            transition: box-shadow 0.4s ease;
        }

        .student.popped {
            transform:scale(1);
        }

        .head {
            width: 60px;
            height: 60px;
            border-radius: 50px; 
            background-color: #89532e;
            display:flex;
            justify-content: center;
            align-items: center;
        }

        .body {
            width: 60px;
            height: 70px;
            background-color: #ad2981;
            border-radius: 20px 20px 0px 0px;

        }

        .glasses {
            display: none;
            align-items:center;
            gap: 0px;
            justify-content: center;
            
        }

        .lens {
            width: 20px;
            height: 20px;
            border: 3px solid black;
            border-radius: 50px;
            background-color: transparent;
        }

        .bridge {
            width: 8px;
            height: 2px;
            background-color: black;
        }

        .show-glasses .glasses {
            display: flex;
        }

        .highlighted {
            box-shadow: 0 0 25px 8px #ccd222;
            border-radius: 12px;
            transition: box-shadow 0.4s ease;
        }

    </style>
</head>

<body>
     <nav>
        <a href="layout.html" class="logo">
        <span class="accent">My</span>Math<span class="accent">Site</span>
        </a>

    </nav>
    
    <div class="main"> 

        <div class="page_controls">
            <a href="fractions.html" class="pageNav_button">← Back</a>
            <a href="fbp1_exercise..html" class="pageNav_button"> Try it yourself</a>
        </div>

        
        <h2>Problem 1</h2>
        <p class="problem-statement">
            There are 12 students in a class. 4 of the students wear glasses.
        </p>
        <p>What fraction of the students wear glasses in the class?</p>

        <div class="animation-box">
            <div class="lesson-layout">
                <div class="classroom" id="classroom"></div>
                <div class="steps-panel" id="steps-panel"></div>
            </div>
        </div>

        <div class="controls">
            <button class="button" id="prevBtn">Previous</button>
            <button class="button" id="nextBtn">Next</button>
        </div>

    </main>

    <script>
        //empty class container
        let classroom = document.getElementById("classroom");

        // random shirt color and skin tones

        let skinTones = ["#f4c2a1", "#843722", "#ddb0a0", "#593b2b", "#f1c27d"];
        let shirtColor = ["#ffa9e3","#95d954", "#9165cd", "#a20732", "#026a81"];

        function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
        }

        let indices = [];
        for (let i = 0; i < 12; i++) {
            indices.push(i);
        }

        shuffle(indices);

        let glassesIndices = indices.slice(0, 4);


        for( let i = 0; i <12; i++) {

            let student = document.createElement("div");
            let head = document.createElement("div");
            let body = document.createElement("div");

            student.classList.add("student");
            head.classList.add("head");
            body.classList.add("body");

            //glasses
            let glasses = document.createElement("div");
            let lensLeft = document.createElement("div");
            let bridge = document.createElement("div");
            let lensRight = document.createElement("div");

            glasses.classList.add("glasses");
            lensLeft.classList.add("lens");
            bridge.classList.add("bridge");
            lensRight.classList.add("lens");

            glasses.appendChild(lensLeft);
            glasses.appendChild(bridge);
            glasses.appendChild(lensRight);
            
            if (glassesIndices.includes(i)) {
                student.classList.add("show-glasses");
            }

            head.appendChild(glasses);


            let randomSkin = skinTones[Math.floor(Math.random() * skinTones.length)];
            head.style.backgroundColor = randomSkin;

            let randomShirt = shirtColor[Math.floor(Math.random()* shirtColor.length)];
            body.style.backgroundColor = randomShirt;

            student.appendChild(head);
            student.appendChild(body);

            classroom.appendChild(student); //add finished student to the class room
        }

        function popInStudents() {
            for(let i = 0; i <classroom.children.length; i++)
            {
                setTimeout(function() {
                    classroom.children[i].classList.add("popped");
                }, i * 100 *2);
            }
        }

        popInStudents();

        const steps = [
            {
                question: "Look at the classroom. How many students are there in total?",
                answer: "There are 12 students in total.",
                why: "This is the denominator — the total always goes on the bottom."
            },
            {
                question: "Some students are wearing glasses. Can you count them?",
                answer: "4 students are wearing glasses.",
                why: "This is the numerator — the part we care about goes on top."
            },
            {
                question: "So how do we write 4 out of 12 as a fraction?",
                answer: "We write it as 4/12 — meaning 4 out of every 12.",
                why: "A fraction is just a part out of whole."
            },
            {
                question: "Can we simplify? Both 4 and 12 can be divided by 4...",
                answer: "4/12 ÷ 4 = 1/3 — same value, simpler form.",
                why: "Dividing top and bottom by the same number never changes the fraction's meaning."
            }

        ];

        let current = 0;

        let nextBtn = document.getElementById("nextBtn");
        let prevBtn = document.getElementById("prevBtn");

        const panel =document.getElementById("steps-panel");

        function showStep(index) {
            panel.innerHTML = "";

            for (let i = 0; i <= index; i++) {

                let card = document.createElement("div");
                card.classList.add("step-card");

                let q = document.createElement("p");
                q.classList.add("step-question");
                q.textContent = steps[i].question;

                let a = document.createElement("p");
                a.classList.add("step-answer");
                a.textContent = steps[i].answer;

                let w = document.createElement("p");
                w.classList.add("step-why");
                w.textContent = steps[i].why;

                card.appendChild(q);
                card.appendChild(a);
                card.appendChild(w);
                panel.appendChild(card);

                if( i < index) {
                    a.classList.add("visible");
                    w.classList.add("visible");
                }

                if( i === index) {
                    setTimeout(() => {a.classList.add("visible");}, 4250);
                    setTimeout(() => {w.classList.add("visible");}, 5500);
                }

            }
            prevBtn.style.visibility = current === 0? "hidden" :"visible"
            nextBtn.style.visibility = current === steps.length - 1 ? "hidden" : "visible";
        } 
        showStep(0);


        nextBtn.addEventListener("click", function()
        {
            if(current === steps.length - 1)
            {
                return;
            }
            
            current++;
            showStep(current);
        });

        prevBtn.addEventListener("click", function()
        {
           if(current === 0)
            {
                return;
            }
            
           current--;
           showStep(current);
        });

    </script>
</body>
